<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday Animation 💌🎂</title>
<style>
body {
  background: #f5f1ea;
  font-family: 'Georgia', serif;
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

/* CONTAINER FOR ENVELOPE AND LETTERS */
#envelopeContainer {
  position: relative;
  width: 300px;
  height: 300px;
}

/* Placeholders stacked */
#envelope, #bow, #letter1, #letter2 {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  font-weight: bold;
  color: white;
  transition: all 1s ease;
}

/* Envelope and bow placeholders */
#envelope { background: #c2a679; }
#bow { background: #b76e79; }

/* Letters initially hidden */
#letter1 { background: #ffffff; color: black; transform: translateY(100px); opacity: 0; z-index: 1; }
#letter2 { background: #ffeeaa; color: black; transform: translateY(100px); opacity: 0; z-index: 1; }

/* Bow unravel animation */
.unravel { transform: translateY(-50px) rotate(-30deg); opacity: 0; }

/* Envelope open animation */
.openEnvelope { transform: rotateX(180deg); }

/* Letters coming out */
.showLetter1 { transform: translateY(-50px); opacity: 1; z-index: 2; }
.showLetter2 { transform: translateY(-60px); opacity: 1; z-index: 3; }

/* CAKE PAGE */
#cakePage {
  display: none;              /* hidden initially */
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

#cake {
  width:200px;
  height:150px;
  background:#f5d0a9;
  margin:0 auto;
  position:relative;
  border-radius:10px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:bold;
  color:#333;
}

#candle {
  width:20px;
  height:50px;
  background:#ffdd00;
  position:absolute;
  top:-50px;
  left:90px;
  border-radius:5px;
}

#flame {
  width:10px;
  height:20px;
  background:orange;
  border-radius:50%;
  margin:0 auto;
  margin-top:-5px;
}

#blowButton {
  margin-top: 30px;
  padding:15px 25px;
  font-size:16px;
  cursor:pointer;
}

#message {
  font-size:18px;
  margin-top:20px;
}
</style>
</head>
<body>

<!-- ENVELOPE AND LETTERS -->
<div id="envelopeContainer">
  <div id="envelope">Envelope</div>
  <div id="bow">Bow</div>
  <div id="letter1">Letter 1</div>
  <div id="letter2">Letter 2</div>
</div>

<!-- CAKE PAGE -->
<div id="cakePage">
  <div id="cake">Cake
    <div id="candle"><div id="flame"></div></div>
  </div>
  <button id="blowButton">Blow the candle!</button>
  <p id="message"></p>
</div>

<script>
const bow = document.getElementById('bow');
const envelope = document.getElementById('envelope');
const letter1 = document.getElementById('letter1');
const letter2 = document.getElementById('letter2');
const envelopeContainer = document.getElementById('envelopeContainer');
const cakePage = document.getElementById('cakePage');

// Animate envelope sequence
function animateEnvelopeSequence() {
  bow.classList.add('unravel'); // step 1

  setTimeout(() => {
    envelope.classList.add('openEnvelope'); // step 2
  }, 1000);

  setTimeout(() => {
    letter1.classList.add('showLetter1'); // step 3
    letter2.classList.add('showLetter2');
  }, 2000);

  setTimeout(() => {
    letter1.style.zIndex = 3; // step 4: first letter forward
    letter2.style.zIndex = 2;
  }, 3000);

  setTimeout(() => {
    letter1.style.zIndex = 2; // step 5: second letter comes forward
    letter2.style.zIndex = 3;
  }, 4500);

  setTimeout(() => {
    envelopeContainer.style.display = 'none'; // step 6: show cake page
    cakePage.style.display = 'flex';
  }, 6000);
}

window.onload = animateEnvelopeSequence;

/* CAKE LOGIC - LONG PRESS */
const blowButton = document.getElementById('blowButton');
const candle = document.getElementById('candle');
const flame = document.getElementById('flame');
const message = document.getElementById('message');
let timer;

blowButton.addEventListener('mousedown', startBlow);
blowButton.addEventListener('touchstart', startBlow);
blowButton.addEventListener('mouseup', cancelBlow);
blowButton.addEventListener('mouseleave', cancelBlow);
blowButton.addEventListener('touchend', cancelBlow);

function startBlow() {
  message.textContent = "Keep pressing to blow the candle...";
  timer = setTimeout(() => {
    flame.style.display = 'none';
    candle.style.background = '#ddd';
    message.textContent = "🎉 Candle blown! Happy Birthday! 🎉";
  }, 5000);
}

function cancelBlow() {
  clearTimeout(timer);
  if (flame.style.display !== 'none') message.textContent = "";
}
</script>
</body>
</html>
