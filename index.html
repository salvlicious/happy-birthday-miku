<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday Animation 💌🎂</title>
<style>
body {
  background: #f5f1ea;
  font-family: 'Georgia', serif;
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

/* CONTAINER FOR ENVELOPE AND LETTERS */
#envelopeContainer {
  position: relative;
  width: 300px;
  height: 300px;
}

/* Images stacked */
#envelope, #bow, #letter1, #letter2 {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  transition: all 1s ease;
}

/* Initially hide letters */
#letter1, #letter2 {
  transform: translateY(100px);
  opacity: 0;
  z-index: 1;
}

/* Bow unravel animation */
.unravel {
  transform: translateY(-50px) rotate(-30deg);
  opacity: 0;
}

/* Envelope open animation */
.openEnvelope {
  transform: rotateX(180deg);
}

/* Letters coming out */
.showLetter1 {
  transform: translateY(-50px);
  opacity: 1;
  z-index: 2;
}

.showLetter2 {
  transform: translateY(-60px);
  opacity: 1;
  z-index: 3;
}

/* CAKE PAGE */
#cakePage {
  display: none;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

#cake {
  width:200px;
  height:150px;
  background:#f5d0a9;
  margin:0 auto;
  position:relative;
  border-radius:10px;
}

#candle {
  width:20px;
  height:50px;
  background:#ffdd00;
  position:absolute;
  top:-50px;
  left:90px;
  border-radius:5px;
}

#flame {
  width:10px;
  height:20px;
  background:orange;
  border-radius:50%;
  margin:0 auto;
  margin-top:-5px;
}

#blowButton {
  margin-top: 30px;
  padding:15px 25px;
  font-size:16px;
  cursor:pointer;
}

#message {
  font-size:18px;
  margin-top:20px;
}
</style>
</head>
<body>

<!-- ENVELOPE AND LETTERS -->
<div id="envelopeContainer">
  <img id="envelope" src="envelope.png" alt="Envelope">
  <img id="bow" src="bow.png" alt="Bow">
  <img id="letter1" src="letter1.png" alt="Letter 1">
  <img id="letter2" src="letter2.png" alt="Letter 2">
</div>

<!-- CAKE PAGE -->
<div id="cakePage">
  <div id="cake">
    <div id="candle"><div id="flame"></div></div>
  </div>
  <button id="blowButton">Blow the candle!</button>
  <p id="message"></p>
</div>

<script>
const bow = document.getElementById('bow');
const envelope = document.getElementById('envelope');
const letter1 = document.getElementById('letter1');
const letter2 = document.getElementById('letter2');
const envelopeContainer = document.getElementById('envelopeContainer');
const cakePage = document.getElementById('cakePage');

// Animate envelope sequence
function animateEnvelopeSequence() {
  // Step 1: Bow unravels
  bow.classList.add('unravel');

  setTimeout(() => {
    // Step 2: Envelope opens
    envelope.classList.add('openEnvelope');
  }, 1000);

  setTimeout(() => {
    // Step 3: Letters slide out
    letter1.classList.add('showLetter1');
    letter2.classList.add('showLetter2');
  }, 2000);

  setTimeout(() => {
    // Step 4: First letter comes forward
    letter1.style.zIndex = 3;
    letter2.style.zIndex = 2;
  }, 3000);

  setTimeout(() => {
    // Step 5: Second letter comes forward
    letter1.style.zIndex = 2;
    letter2.style.zIndex = 3;
  }, 4500);

  setTimeout(() => {
    // Step 6: Hide envelopeContainer, show cake page
    envelopeContainer.style.display = 'none';
    cakePage.style.display = 'flex';
  }, 6000); // 6 seconds for the full letter animation
}

// Trigger animation on page load (or you can trigger on click)
window.onload = animateEnvelopeSequence;

/* CAKE LOGIC - LONG PRESS */
const blowButton = document.getElementById('blowButton');
const candle = document.getElementById('candle');
const flame = document.getElementById('flame');
const message = document.getElementById('message');
let timer;

blowButton.addEventListener('mousedown', startBlow);
blowButton.addEventListener('touchstart', startBlow);
blowButton.addEventListener('mouseup', cancelBlow);
blowButton.addEventListener('mouseleave', cancelBlow);
blowButton.addEventListener('touchend', cancelBlow);

function startBlow() {
  message.textContent = "Keep pressing to blow the candle...";
  timer = setTimeout(() => {
    flame.style.display = 'none';
    candle.style.background = '#ddd';
    message.textContent = "🎉 Candle blown! Happy Birthday! 🎉";
  }, 5000);
}

function cancelBlow() {
  clearTimeout(timer);
  if (flame.style.display !== 'none') message.textContent = "";
}
</script>
</body>
</html>
