<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Mirko 🎉</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Dancing Script', cursive;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    background: #0d0202;
  }

  /* ─────────────────────────────────────────
     PAGES
  ───────────────────────────────────────── */
  .page {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.7s ease;
    z-index: 1;
  }
  .page.active {
    opacity: 1;
    pointer-events: all;
    z-index: 10;
  }

  /* ─────────────────────────────────────────
     PAGE 1 — LANDING
  ───────────────────────────────────────── */
  #page-landing { flex-direction: column; }

  /* Background — swap src for your image in assets */
  .landing-bg {
    position: absolute;
    inset: 0;
    background-color: #1a0505;
    background-image: url('assets/background.jpg');
    background-size: cover;
    background-position: center;
    z-index: 0;
  }

  /* Sparkle canvas */
  #sparkle-canvas {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 2;
  }

  /* Balloons */
  .balloon-wrap {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 3;
  }

  .balloon {
    position: absolute;
    bottom: -140px;
    border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
    animation: floatUp linear infinite;
    /* semi-transparent */
    opacity: 0.45;
  }
  .balloon::after {
    content: '';
    position: absolute;
    bottom: -30px; left: 50%;
    transform: translateX(-50%);
    width: 1px; height: 30px;
    background: rgba(255,255,255,0.3);
  }
  .balloon::before {
    content: '';
    position: absolute;
    bottom: -5px; left: 50%;
    transform: translateX(-50%);
    width: 7px; height: 7px;
    background: inherit;
    filter: brightness(0.6);
    border-radius: 50%;
  }

  @keyframes floatUp {
    0%   { transform: translateY(0) rotate(-4deg); }
    50%  { transform: translateY(-50vh) rotate(4deg); }
    100% { transform: translateY(-120vh) rotate(-3deg); opacity: 0; }
  }

  /* HB Mirko transparent PNG — swap src in assets */
  .hb-img {
    position: absolute;
    top: 8%;
    left: 50%;
    transform: translateX(-50%);
    width: min(88vw, 760px);
    pointer-events: none;
    z-index: 5;
    user-select: none;
  }
  @media (orientation: portrait) {
    .hb-img { top: 12%; width: min(95vw, 480px); }
  }

  /* Enter button */
  .enter-btn {
    position: absolute;
    top: 62%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    padding: 13px 50px;
    background: rgba(8, 2, 2, 0.5);
    color: #fff;
    border: 1.5px solid #d4a017;
    border-radius: 50px;
    font-family: 'Dancing Script', cursive;
    font-size: clamp(1.1rem, 2.8vw, 1.5rem);
    font-weight: 600;
    cursor: pointer;
    backdrop-filter: blur(6px);
    box-shadow: 0 0 20px rgba(212,160,23,0.4);
    transition: all 0.2s ease;
    white-space: nowrap;
    letter-spacing: 1px;
  }
  .enter-btn:hover {
    background: rgba(150, 20, 10, 0.7);
    border-color: rgba(255,255,255,0.7);
    box-shadow: 0 0 30px rgba(212,160,23,0.7);
    transform: translateX(-50%) translateY(-2px) scale(1.03);
  }
  @media (orientation: portrait) { .enter-btn { top: 56%; } }
  @media (max-width: 480px)       { .enter-btn { top: 53%; padding: 11px 36px; } }

  /* ─────────────────────────────────────────
     PAGE 2 — PASSWORD
  ───────────────────────────────────────── */
  #page-password {
    background: linear-gradient(135deg, #dceeff 0%, #eef6ff 40%, #f0f8ff 70%, #e8f4ff 100%);
  }

  /* floating soft clouds/circles deco */
  #page-password::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 30%, rgba(180,220,255,0.35) 0%, transparent 70%),
      radial-gradient(ellipse 50% 35% at 80% 70%, rgba(200,230,255,0.3) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 50% 10%, rgba(255,255,255,0.5) 0%, transparent 70%);
    pointer-events: none;
  }

  .pw-card {
    position: relative;
    z-index: 5;
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(14px);
    border: 1.5px solid rgba(180,220,255,0.6);
    border-radius: 28px;
    padding: 52px 56px 44px;
    max-width: 420px;
    width: 90%;
    text-align: center;
    box-shadow: 0 8px 40px rgba(100,160,220,0.18), 0 2px 0 rgba(255,255,255,0.8) inset;
  }

  .pw-emoji { font-size: 2.4rem; margin-bottom: 10px; display: block; }

  .pw-title {
    font-size: clamp(1.4rem, 4vw, 1.9rem);
    color: #4a7fa5;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .pw-sub {
    font-size: 1.05rem;
    color: #89b4cc;
    margin-bottom: 28px;
  }

  /* Input row with eye toggle */
  .pw-input-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }

  .pw-input {
    width: 100%;
    padding: 13px 46px 13px 18px;
    border: 1.5px solid #b0d4ee;
    border-radius: 14px;
    font-family: 'Dancing Script', cursive;
    font-size: 1.3rem;
    color: #3a6a8a;
    background: rgba(255,255,255,0.85);
    outline: none;
    text-align: center;
    letter-spacing: 1px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .pw-input:focus {
    border-color: #7ab8d8;
    box-shadow: 0 0 0 3px rgba(122,184,216,0.2);
  }
  .pw-input.error {
    border-color: #e08080;
    animation: shake 0.4s ease;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%      { transform: translateX(-8px); }
    40%      { transform: translateX(8px); }
    60%      { transform: translateX(-5px); }
    80%      { transform: translateX(5px); }
  }

  /* Eye button */
  .eye-btn {
    position: absolute;
    right: 12px;
    background: none;
    border: none;
    cursor: pointer;
    color: #89b4cc;
    font-size: 1.2rem;
    line-height: 1;
    padding: 4px;
    transition: color 0.2s;
    display: flex;
    align-items: center;
  }
  .eye-btn:hover { color: #4a7fa5; }

  .eye-icon { width: 22px; height: 22px; }

  /* Error message */
  .pw-error {
    min-height: 22px;
    margin-top: 10px;
    font-size: 1rem;
    color: #c06060;
    transition: opacity 0.3s;
  }

  /* Unlock button */
  .unlock-btn {
    margin-top: 18px;
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #7ab8d8 0%, #5a9dbf 100%);
    color: white;
    border: none;
    border-radius: 14px;
    font-family: 'Dancing Script', cursive;
    font-size: 1.4rem;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 5px 0 #3d7fa0, 0 8px 20px rgba(90,157,191,0.3);
    transition: all 0.15s ease;
    letter-spacing: 0.5px;
  }
  .unlock-btn:hover  { transform: translateY(-2px); box-shadow: 0 7px 0 #3d7fa0, 0 12px 24px rgba(90,157,191,0.35); }
  .unlock-btn:active { transform: translateY(3px);  box-shadow: 0 2px 0 #3d7fa0; }

  /* Confetti canvas */
  #confetti-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 999;
  }

  /* ─────────────────────────────────────────
     PAGE 3 — LETTER
  ───────────────────────────────────────── */
  #page-letter {
    flex-direction: column;
    gap: 24px;
    /* Background — swap src in assets */
    background-image: url('assets/letter-bg.jpg');
    background-size: cover;
    background-position: center;
  }

  /* Fallback colour if bg not loaded */
  #page-letter::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #1a0a0a 0%, #2a0f0f 100%);
    z-index: 0;
  }

  .letter-title {
    position: relative;
    z-index: 5;
    color: #d4a017;
    font-size: clamp(1.2rem, 3.5vw, 1.6rem);
    font-weight: 600;
    text-shadow: 0 2px 10px rgba(0,0,0,0.6);
  }

  /* ── ENVELOPE SCENE ── */
  .env-scene {
    position: relative;
    z-index: 5;
    width: min(320px, 88vw);
    height: 420px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }

  /* Envelope wrapper — clickable */
  .envelope {
    position: absolute;
    bottom: 0;
    width: 100%;
    cursor: pointer;
    user-select: none;
  }

  /* Closed envelope image — swap src in assets */
  .env-closed {
    width: 100%;
    display: block;
    /* placeholder style */
    min-height: 190px;
    border-radius: 8px;
  }
  /* Open envelope image — swap src in assets */
  .env-open {
    width: 100%;
    display: none;
    min-height: 190px;
    border-radius: 8px;
  }

  /* ── LETTER PAPERS ── */
  .letter-stack {
    position: absolute;
    bottom: 170px; /* sits above envelope */
    left: 50%;
    transform: translateX(-50%);
    width: 86%;
    display: none; /* shown when letters revealed */
  }

  .letter-page {
    position: absolute;
    width: 100%;
    border-radius: 8px;
    overflow: hidden;
    transition: transform 0.5s cubic-bezier(.4,0,.2,1), opacity 0.4s;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  /* Letter images — swap src in assets */
  .letter-page img {
    width: 100%;
    display: block;
    border-radius: 8px;
    /* placeholder style */
    min-height: 200px;
    background: #fffef8;
  }

  /* Letter page stacking — JS controls z-index and top dynamically */
  .letter-page { top: 0; }

  /* Click hint */
  .env-hint {
    position: relative;
    z-index: 5;
    color: rgba(255,255,255,0.55);
    font-size: 0.95rem;
    text-align: center;
    animation: pulse 2.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 0.65; }
    50%      { opacity: 0.2; }
  }

</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<!-- ═══════════════════════════════════════
     PAGE 1 — LANDING
═══════════════════════════════════════ -->
<div class="page active" id="page-landing">

  <!-- SWAP: replace with your landscape/portrait bg via assets/ -->
  <div class="landing-bg"></div>

  <canvas id="sparkle-canvas"></canvas>
  <div class="balloon-wrap" id="balloon-wrap"></div>

  <!-- SWAP: replace src with assets/hb-mirko.png -->
  <img class="hb-img"
       src="assets/happy-birthday-mirko.png"
       alt="Happy Birthday Mirko"
       onerror="this.style.display='none'" />

  <button class="enter-btn" onclick="goTo('page-password')">click to enter ✨</button>
</div>

<!-- ═══════════════════════════════════════
     PAGE 2 — PASSWORD
═══════════════════════════════════════ -->
<div class="page" id="page-password">
  <div class="pw-card">
    <span class="pw-emoji">🔐</span>
    <p class="pw-title">enter the password</p>
    <p class="pw-sub">psst — you know this one 🤫</p>

    <div class="pw-input-wrap">
      <input
        type="password"
        id="pw-input"
        class="pw-input"
        placeholder="type here..."
        autocomplete="off"
        onkeydown="if(event.key==='Enter') checkPw()"
      />
      <button class="eye-btn" onclick="toggleEye()" id="eye-btn" title="show/hide password">
        <!-- Closed eye (default) -->
        <svg id="eye-closed" class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
          <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
          <line x1="1" y1="1" x2="23" y2="23"/>
        </svg>
        <!-- Open eye (hidden by default) -->
        <svg id="eye-open" class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>

    <p class="pw-error" id="pw-error"></p>
    <button class="unlock-btn" onclick="checkPw()">unlock 🔓</button>
  </div>
</div>

<!-- ═══════════════════════════════════════
     PAGE 3 — LETTER
═══════════════════════════════════════ -->
<div class="page" id="page-letter">

  <p class="letter-title">a little something for you 💌</p>

  <div class="env-scene" id="env-scene">

    <!-- Letter stack (hidden until revealed) -->
    <div class="letter-stack" id="letter-stack">
      <div class="letter-page" id="lp-1" onclick="flipLetter(event)">
        <img src="assets/letter-page-1.jpg" alt="Letter page 1" />
      </div>
      <div class="letter-page" id="lp-2" onclick="flipLetter(event)">
        <img src="assets/letter-page-2.jpg" alt="Letter page 2" />
      </div>
      <div class="letter-page" id="lp-3" onclick="flipLetter(event)">
        <img src="assets/letter-page-3.jpg" alt="Letter page 3" />
      </div>
    </div>

    <!-- Envelope — SWAP srcs with assets/envelope-closed.png and assets/envelope-open.png -->
    <div class="envelope" id="envelope" onclick="handleEnvClick(event)">
      <img class="env-closed" id="env-closed"
           src="assets/closed-envelope.png" alt="Closed envelope"
           onerror="this.style.background='#f5e6c0'; this.style.border='2px solid #d4a017';" />
      <img class="env-open" id="env-open"
           src="assets/open-envelope.png" alt="Open envelope"
           onerror="this.style.background='#ead5a0'; this.style.border='2px solid #d4a017';" />
    </div>

  </div>

  <p class="env-hint" id="env-hint">tap the envelope to open it ✨</p>

</div>

<script>
  // ═══════════════════════════════════════
  // PAGE TRANSITIONS
  // ═══════════════════════════════════════
  function goTo(id) {
    document.querySelectorAll('.page').forEach(p => {
      p.classList.remove('active');
    });
    setTimeout(() => {
      document.getElementById(id).classList.add('active');
    }, 50);
  }

  // ═══════════════════════════════════════
  // SPARKLES
  // ═══════════════════════════════════════
  const sc = document.getElementById('sparkle-canvas');
  const sx = sc.getContext('2d');
  function resizeSC() { sc.width = innerWidth; sc.height = innerHeight; }
  resizeSC();
  window.addEventListener('resize', resizeSC);

  const sparks = Array.from({length: 110}, () => ({
    x: Math.random() * innerWidth,
    y: Math.random() * innerHeight,
    r: 0.4 + Math.random() * 1.5,
    speed: 0.004 + Math.random() * 0.013,
    phase: Math.random() * Math.PI * 2,
    gold: Math.random() > 0.45
  }));

  (function animateSparks(t) {
    sx.clearRect(0, 0, sc.width, sc.height);
    sparks.forEach(s => {
      const a = 0.1 + 0.9 * Math.abs(Math.sin(t * s.speed + s.phase));
      sx.beginPath();
      sx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      sx.fillStyle = s.gold
        ? `rgba(212,170,30,${a})`
        : `rgba(255,230,200,${a * 0.65})`;
      sx.fill();
    });
    requestAnimationFrame(animateSparks);
  })(0);

  // ═══════════════════════════════════════
  // BALLOONS
  // ═══════════════════════════════════════
  const balloonColors = [
    'rgba(139,0,0,0.55)',
    'rgba(192,57,43,0.5)',
    'rgba(212,160,23,0.5)',
    'rgba(122,26,26,0.5)',
    'rgba(184,134,11,0.45)',
    'rgba(160,20,20,0.48)'
  ];
  const bw = document.getElementById('balloon-wrap');
  for (let i = 0; i < 12; i++) {
    const b = document.createElement('div');
    b.className = 'balloon';
    const w = 28 + Math.random() * 22;
    const dur = 10 + Math.random() * 10;
    b.style.cssText = `
      left:${3 + i * 8 + (Math.random()-0.5)*5}%;
      width:${w}px; height:${w*1.28}px;
      background:${balloonColors[i % balloonColors.length]};
      animation-duration:${dur}s;
      animation-delay:${-(Math.random()*dur)}s;
    `;
    bw.appendChild(b);
  }

  // ═══════════════════════════════════════
  // PASSWORD
  // ═══════════════════════════════════════
  const PASSWORD = 'mirkoissalvassweetboy';
  let eyeVisible = false;

  function toggleEye() {
    eyeVisible = !eyeVisible;
    const inp = document.getElementById('pw-input');
    inp.type = eyeVisible ? 'text' : 'password';
    document.getElementById('eye-open').style.display  = eyeVisible ? 'block' : 'none';
    document.getElementById('eye-closed').style.display = eyeVisible ? 'none'  : 'block';
  }

  function checkPw() {
    const inp = document.getElementById('pw-input');
    const err = document.getElementById('pw-error');
    const val = inp.value.trim().toLowerCase().replace(/\s/g, '');

    if (val === PASSWORD) {
      err.textContent = '';
      launchConfetti();
      setTimeout(() => {
        goTo('page-letter');
        inp.value = '';
      }, 1600);
    } else {
      inp.classList.add('error');
      err.textContent = "That's not the password, try again honey 🩷";
      setTimeout(() => inp.classList.remove('error'), 500);
    }
  }

  // ═══════════════════════════════════════
  // CONFETTI
  // ═══════════════════════════════════════
  function launchConfetti() {
    const cv = document.getElementById('confetti-canvas');
    const cx = cv.getContext('2d');
    cv.width = innerWidth; cv.height = innerHeight;
    const cols = ['#c0392b','#d4a017','#7ab8d8','#a8d8a8','#f5e6c0','#ffffff','#5a9dbf'];
    const pieces = Array.from({length: 180}, () => ({
      x: Math.random() * cv.width,
      y: -10 - Math.random() * 120,
      r: 4 + Math.random() * 6,
      color: cols[Math.floor(Math.random() * cols.length)],
      vx: (Math.random() - 0.5) * 5,
      vy: 3 + Math.random() * 5,
      angle: Math.random() * Math.PI * 2,
      spin: (Math.random() - 0.5) * 0.18
    }));
    let frame = 0;
    (function draw() {
      cx.clearRect(0, 0, cv.width, cv.height);
      pieces.forEach(p => {
        cx.save();
        cx.translate(p.x, p.y);
        cx.rotate(p.angle);
        cx.fillStyle = p.color;
        cx.fillRect(-p.r/2, -p.r/2, p.r, p.r * 2.2);
        cx.restore();
        p.x += p.vx; p.y += p.vy;
        p.angle += p.spin; p.vy += 0.06;
      });
      if (++frame < 140) requestAnimationFrame(draw);
      else cx.clearRect(0, 0, cv.width, cv.height);
    })();
  }

  // ═══════════════════════════════════════
  // ENVELOPE / LETTER LOGIC
  // ═══════════════════════════════════════
  // States: 'closed' → 'open' → 'letters'
  // Within 'letters': letter 1 or 2 on top
  // Clicking outside letters → back to 'closed'

  const TOTAL_LETTERS = 3;
  let envState = 'closed'; // 'closed' | 'open' | 'letters'
  let activeLetter = 1;

  function handleEnvClick(e) {
    e.stopPropagation();
    if (envState === 'closed') {
      document.getElementById('env-closed').style.display = 'none';
      document.getElementById('env-open').style.display   = 'block';
      document.getElementById('env-hint').textContent = 'tap again to take out the letters ✉️';
      envState = 'open';
    } else if (envState === 'open') {
      document.getElementById('letter-stack').style.display = 'block';
      document.getElementById('env-hint').textContent = 'tap a letter to turn the page, tap outside to close 💌';
      envState = 'letters';
      activeLetter = 1;
      updateLetterView();
    }
  }

  function flipLetter(e) {
    e.stopPropagation();
    if (envState !== 'letters') return;
    // Tapping the top letter goes to next; if on last, wraps back to 1
    activeLetter = activeLetter < TOTAL_LETTERS ? activeLetter + 1 : 1;
    updateLetterView();
  }

  function updateLetterView() {
    for (let i = 1; i <= TOTAL_LETTERS; i++) {
      const el = document.getElementById('lp-' + i);
      if (!el) continue;
      if (i === activeLetter) {
        el.style.zIndex = 3;
        el.style.top = '0px';
        el.style.opacity = '1';
      } else if (i === (activeLetter % TOTAL_LETTERS) + 1) {
        // next letter peeks below
        el.style.zIndex = 2;
        el.style.top = '18px';
        el.style.opacity = '0.85';
      } else {
        el.style.zIndex = 1;
        el.style.top = '24px';
        el.style.opacity = '0.6';
      }
    }
    document.getElementById('env-hint').textContent =
      `letter ${activeLetter} of ${TOTAL_LETTERS} — tap to turn the page 💌`;
  }

  // Clicking outside the scene resets envelope
  document.getElementById('page-letter').addEventListener('click', function() {
    if (envState === 'letters' || envState === 'open') {
      document.getElementById('env-closed').style.display = 'block';
      document.getElementById('env-open').style.display   = 'none';
      document.getElementById('letter-stack').style.display = 'none';
      document.getElementById('env-hint').textContent = 'tap the envelope to open it ✨';
      envState = 'closed';
      activeLetter = 1;
    }
  });

  document.getElementById('env-scene').addEventListener('click', e => e.stopPropagation());
</script>
</body>
</html>
