<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For You 💌</title>

<style>
body {
  background: #f5f1ea;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: 'Georgia', serif;
  margin: 0;
}

.container {
  position: relative;
  cursor: pointer;
}

.envelope {
  width: 300px;
  height: 200px;
  background: #e8d8c3;
  position: relative;
  transition: 0.8s;
}

.flap {
  position: absolute;
  width: 0;
  height: 0;
  border-left: 150px solid transparent;
  border-right: 150px solid transparent;
  border-bottom: 100px solid #d9c2a6;
  top: -100px;
  left: 0;
  transform-origin: bottom;
  transition: 0.8s;
}

.bow {
  position: absolute;
  width: 80px;
  height: 30px;
  background: #b76e79;
  border-radius: 20px;
  top: 85px;
  left: 110px;
  transition: 0.5s;
}

.letter {
  position: absolute;
  width: 260px;
  height: 160px;
  background: white;
  top: 20px;
  left: 20px;
  transform: translateY(100px);
  transition: 0.8s;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 18px;
  opacity: 0;
}

.open .flap {
  transform: rotateX(180deg);
}

.show-letter .letter {
  transform: translateY(-120px);
  opacity: 1;
}

.hide-bow .bow {
  opacity: 0;
}
</style>
</head>

<body>

<div class="container" onclick="nextStep()">
  <div class="flap"></div>
  <div class="envelope"></div>
  <div class="bow"></div>
  <div class="letter">
    Your letter will appear here 💖
  </div>
</div>

<script>
let step = 0;

function nextStep() {
  const container = document.querySelector('.container');
  
  if (step === 0) {
    container.classList.add('hide-bow');
  } else if (step === 1) {
    container.classList.add('open');
  } else if (step === 2) {
    container.classList.add('show-letter');
  }
  
  step++;
}
</script>

</body>
  </html>
