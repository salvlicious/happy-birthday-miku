<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Mirko 🎈</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            height: 100dvh;
            font-family: 'Georgia', 'Times New Roman', serif;
            overflow-x: hidden;
            position: relative;
        }

        /* ============ PAGE 1: LANDING PAGE ============ */
        #page1 {
            height: 100vh;
            height: 100dvh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-image: url('assets/background.jpg');
        }

        #page1::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            z-index: 1;
        }

        .balloons-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            overflow: hidden;
        }

        .balloon {
            position: absolute;
            bottom: -200px;
            animation: floatUp 8s ease-in infinite;
        }

        .balloon-body {
            width: 60px;
            height: 75px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            position: relative;
        }

        .balloon-string {
            width: 1.5px;
            height: 50px;
            background: rgba(255, 255, 255, 0.4);
            position: absolute;
            bottom: -45px;
            left: 50%;
            transform: translateX(-50%);
        }

        .balloon-knot {
            width: 6px;
            height: 6px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            position: absolute;
            bottom: -3px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* Balloon colors - Orange, Red, Gold theme */
        .balloon:nth-child(1) .balloon-body { background: radial-gradient(circle at 35% 30%, #FF6B35, #CC4400); }
        .balloon:nth-child(2) .balloon-body { background: radial-gradient(circle at 35% 30%, #DAA520, #8B6914); }
        .balloon:nth-child(3) .balloon-body { background: radial-gradient(circle at 35% 30%, #c0392b, #7b241c); }
        .balloon:nth-child(4) .balloon-body { background: radial-gradient(circle at 35% 30%, #FF8C42, #E05500); }
        .balloon:nth-child(5) .balloon-body { background: radial-gradient(circle at 35% 30%, #DAA520, #946f1a); }
        .balloon:nth-child(6) .balloon-body { background: radial-gradient(circle at 35% 30%, #d44545, #8b1a1a); }
        .balloon:nth-child(7) .balloon-body { background: radial-gradient(circle at 35% 30%, #F4A460, #C87030); }
        .balloon:nth-child(8) .balloon-body { background: radial-gradient(circle at 35% 30%, #B8860B, #7A5A00); }

        .balloon:nth-child(1) { left: 5%; animation-delay: 0s; animation-duration: 7s; }
        .balloon:nth-child(2) { left: 18%; animation-delay: 1.5s; animation-duration: 8.5s; }
        .balloon:nth-child(3) { left: 30%; animation-delay: 3s; animation-duration: 7.5s; }
        .balloon:nth-child(4) { left: 43%; animation-delay: 0.5s; animation-duration: 9s; }
        .balloon:nth-child(5) { left: 56%; animation-delay: 2s; animation-duration: 8s; }
        .balloon:nth-child(6) { left: 68%; animation-delay: 3.5s; animation-duration: 7s; }
        .balloon:nth-child(7) { left: 78%; animation-delay: 1s; animation-duration: 8.5s; }
        .balloon:nth-child(8) { left: 90%; animation-delay: 2.5s; animation-duration: 7.5s; }

        @keyframes floatUp {
            0% {
                bottom: -200px;
                transform: translateX(0) rotate(0deg);
                opacity: 0.8;
            }
            20% {
                opacity: 0.95;
            }
            50% {
                transform: translateX(40px) rotate(4deg);
            }
            80% {
                opacity: 0.9;
            }
            100% {
                bottom: 110vh;
                transform: translateX(-30px) rotate(-3deg);
                opacity: 0;
            }
        }

        .sparkle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #DAA520;
            border-radius: 50%;
            animation: twinkle 2s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes twinkle {
            0%, 100% { 
                opacity: 0; 
                transform: scale(0);
                box-shadow: 0 0 0px #DAA520;
            }
            50% { 
                opacity: 1; 
                transform: scale(1);
                box-shadow: 0 0 6px #DAA520, 0 0 12px #DAA520;
            }
        }

        .landing-content {
            position: relative;
            z-index: 10;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            width: 100%;
            max-width: 700px;
        }

        .heading-image {
            width: 90%;
            max-width: 550px;
            height: auto;
            margin-bottom: 40px;
            display: block;
        }

        @media (max-width: 480px) {
            .heading-image {
                max-width: 320px;
                margin-bottom: 30px;
            }
        }

        .enter-btn {
            display: inline-block;
            padding: 14px 45px;
            font-size: 1.1em;
            background: rgba(26, 10, 10, 0.7);
            color: #DAA520;
            border: 2px solid #DAA520;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Georgia', serif;
            letter-spacing: 4px;
            text-transform: uppercase;
            transition: all 0.4s ease;
            backdrop-filter: blur(5px);
            position: relative;
            overflow: hidden;
        }

        .enter-btn:hover {
            background: rgba(218, 165, 32, 0.3);
            border-color: #ffffff;
            color: #ffffff;
            box-shadow: 0 0 30px rgba(218, 165, 32, 0.5), 0 0 60px rgba(218, 165, 32, 0.2);
            transform: scale(1.04);
        }

        .enter-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 50%;
            height: 200%;
            background: rgba(255, 255, 255, 0.15);
            transform: rotate(25deg);
            transition: left 0.6s;
        }

        .enter-btn:hover::after {
            left: 120%;
        }

        @media (max-width: 480px) {
            .enter-btn {
                padding: 12px 35px;
                font-size: 1em;
                letter-spacing: 3px;
            }
        }

        /* ============ PAGE 2: ENVELOPE PAGE ============ */
        #page2 {
            height: 100vh;
            height: 100dvh;
            width: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            /* Dark green placeholder - CHANGE THIS to your drawn background */
            background: #1a3a1a;
            background-image: url('assets/envelope-bg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* If the background image doesn't load, fallback to dark green */
        @supports not (background-image: url('assets/envelope-bg.jpg')) {
            #page2 {
                background: radial-gradient(ellipse at center, #2d5a2d 0%, #1a3a1a 50%, #0d1f0d 100%);
            }
        }

        /* Envelope container */
        .envelope-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Closed envelope image placeholder */
        .envelope-closed {
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
            z-index: 20;
        }

        .envelope-closed:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        /* REPLACE THIS with your closed envelope image */
        .envelope-closed-img {
            width: 300px;
            height: auto;
            display: block;
        }

        @media (max-width: 480px) {
            .envelope-closed-img {
                width: 240px;
            }
        }

        /* Open envelope view */
        .envelope-open-view {
            display: none;
            position: relative;
            z-index: 20;
            text-align: center;
        }

        .envelope-open-view.visible {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* REPLACE THIS with your open envelope image (showing two pages inside) */
        .envelope-open-img {
            width: 450px;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        @media (max-width: 480px) {
            .envelope-open-img {
                width: 320px;
            }
        }

        /* Pages inside the envelope */
        .pages-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 55%;
            height: 60%;
            perspective: 1000px;
            z-index: 25;
        }

        @media (max-width: 480px) {
            .pages-container {
                width: 60%;
                height: 55%;
            }
        }

        .page-card {
            position: absolute;
            width: 100%;
            height: 100%;
            cursor: pointer;
            transition: all 0.6s ease;
            transform-origin: left center;
            border-radius: 3px;
        }

        /* Page 1 (front page) */
        .page-front {
            z-index: 3;
            background: #F5E6D3;
            border: 2px solid #DAA520;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* REPLACE THIS with your page 1 image */
        .page-front-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Page 2 (peeking from behind) */
        .page-back {
            z-index: 2;
            background: #E8D5C0;
            border: 2px solid #B8860B;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.2);
            transform: translateX(5px) translateY(-3px) rotate(-2deg);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* REPLACE THIS with your page 2 image */
        .page-back-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Page flipping animations */
        .page-front.flipped {
            transform: rotateY(-170deg);
            z-index: 1;
            opacity: 0;
        }

        .page-back.brought-forward {
            z-index: 3;
            transform: translateX(0) translateY(0) rotate(0deg);
        }

        .page-back.sent-back {
            z-index: 2;
            transform: translateX(5px) translateY(-3px) rotate(-2deg);
        }

        /* Indicator dots */
        .page-indicators {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
            z-index: 30;
            position: relative;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(218, 165, 32, 0.4);
            transition: all 0.3s;
        }

        .dot.active {
            background: #DAA520;
            box-shadow: 0 0 8px rgba(218, 165, 32, 0.6);
        }

        /* Click outside hint */
        .close-hint {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8em;
            margin-top: 12px;
            z-index: 30;
            position: relative;
            font-style: italic;
        }

        /* Envelope click hint */
        .envelope-hint {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85em;
            margin-top: 12px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }

        /* Back button */
        .back-to-landing {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 30;
            background: rgba(0,0,0,0.5);
            color: #DAA520;
            border: 1px solid #DAA520;
            padding: 8px 18px;
            border-radius: 25px;
            cursor: pointer;
            font-family: 'Georgia', serif;
            font-size: 0.85em;
            transition: all 0.3s;
        }

        .back-to-landing:hover {
            background: rgba(218, 165, 32, 0.3);
            color: white;
        }

        @media (max-width: 480px) {
            .back-to-landing {
                top: 10px;
                left: 10px;
                padding: 6px 14px;
                font-size: 0.75em;
            }
        }

    </style>
</head>
