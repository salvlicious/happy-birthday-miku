<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday 💌🎂</title>
<style>
/* GENERAL PAGE STYLING */
body {
  background: #f5f1ea;
  font-family: 'Georgia', serif;
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

/* ENVELOPE PAGE */
#envelopePage {
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  width: 100%;
  height: 100vh;
}

.container {
  position: relative;
  cursor: pointer;
  width: 300px;
  height: 300px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.envelope {
  width: 300px;
  height: 200px;
  background: #e8d8c3;
  position: relative;
  transition: 0.8s;
}

.flap {
  position: absolute;
  width: 0;
  height: 0;
  border-left: 150px solid transparent;
  border-right: 150px solid transparent;
  border-bottom: 100px solid #d9c2a6;
  top: -100px;
  left: 0;
  transform-origin: bottom;
  transition: 0.8s;
}

.bow {
  position: absolute;
  width: 80px;
  height: 30px;
  background: #b76e79;
  border-radius: 20px;
  top: 85px;
  left: 110px;
  transition: 0.5s;
}

.letter {
  position: absolute;
  width: 260px;
  height: 160px;
  background: white;
  top: 20px;
  left: 20px;
  transform: translateY(100px);
  transition: 0.8s;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 18px;
  opacity: 0;
  flex-direction: column;
}

.open .flap { transform: rotateX(180deg); }
.show-letter .letter { transform: translateY(-120px); opacity: 1; }
.hide-bow .bow { opacity: 0; }

/* NEXT BUTTON STYLING */
#nextButton {
  display: block;
  margin: 20px auto 0 auto;
  padding: 15px 40px;
  font-size: 20px;
  font-weight: bold;
  background: #ff4b5c;
  color: white;
  border: none;
  border-radius: 15px;
  cursor: pointer;
  box-shadow: 0 5px 10px rgba(0,0,0,0.2);
  transition: transform 0.2s, background 0.2s;
}

#nextButton:hover {
  background: #ff758f;
  transform: translateY(-3px);
}

#nextButton:active {
  transform: translateY(0px);
}

/* CAKE PAGE */
#cakePage {
  display: none;              /* hidden initially */
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

#cake {
  width:200px;
  height:150px;
  background:#f5d0a9;
  margin:0 auto;
  position:relative;
  border-radius:10px;
}

#candle {
  width:20px;
  height:50px;
  background:#ffdd00;
  position:absolute;
  top:-50px;
  left:90px;
  border-radius:5px;
}

#flame {
  width:10px;
  height:20px;
  background:orange;
  border-radius:50%;
  margin:0 auto;
  margin-top:-5px;
}

#blowButton {
  margin-top: 30px;
  padding:15px 25px;
  font-size:16px;
  cursor:pointer;
}

#message {
  font-size:18px;
  margin-top:20px;
}
</style>
</head>

<body>

<!-- ENVELOPE PAGE -->
<div id="envelopePage">
  <div class="container" onclick="nextStep()">
    <div class="flap"></div>
    <div class="envelope"></div>
    <div class="bow"></div>
    <div class="letter">
      <p>Happy Birthday My Love 💖</p>
      <p>I can’t wait to celebrate you today 🎉</p>
      <button id="nextButton" onclick="showCakePage(event)">Next →</button>
    </div>
  </div>
</div>

<!-- CAKE PAGE -->
<div id="cakePage">
  <div id="cake">
    <div id="candle"><div id="flame"></div></div>
  </div>
  <button id="blowButton">Blow the candle!</button>
  <p id="message"></p>
</div>

<script>
/* ENVELOPE LOGIC */
let step = 0;
function nextStep() {
  const container = document.querySelector('.container');
  if (step === 0) { container.classList.add('hide-bow'); }
  else if (step === 1) { container.classList.add('open'); }
  else if (step === 2) { container.classList.add('show-letter'); }
  step++;
}

/* NEXT BUTTON TO CAKE */
function showCakePage(e) {
  e.stopPropagation();
  document.getElementById('envelopePage').style.display = 'none';
  document.getElementById('cakePage').style.display = 'flex';
}

/* CAKE LOGIC - LONG PRESS */
const blowButton = document.getElementById('blowButton');
const candle = document.getElementById('candle');
const flame = document.getElementById('flame');
const message = document.getElementById('message');
let timer;

blowButton.addEventListener('mousedown', startBlow);
blowButton.addEventListener('touchstart', startBlow);
blowButton.addEventListener('mouseup', cancelBlow);
blowButton.addEventListener('mouseleave', cancelBlow);
blowButton.addEventListener('touchend', cancelBlow);

function startBlow() {
  message.textContent = "Keep pressing to blow the candle...";
  timer = setTimeout(() => {
    flame.style.display = 'none';
    candle.style.background = '#ddd';
    message.textContent = "🎉 Candle blown! Happy Birthday! 🎉";
  }, 5000);
}

function cancelBlow() {
  clearTimeout(timer);
  if (flame.style.display !== 'none') message.textContent = "";
}
</script>

</body>
      </html>
